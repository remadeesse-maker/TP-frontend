<section>
<h2>Contactez-nous</h2>
<p>Une question, un projet ? N'hésitez pas à nous écrire, nous vous répondrons dans les plus brefs délais.</p>
<form action="#" method="post">
<div>
<label for="nom">Nom :</label>
<input type="text" id="nom" name="nom" required>
</div>
<div>
<label for="prenom">Prénom :</label>
<input type="text" id="prenom" name="prenom" required>
</div>
<div>
<label for="email">Email :</label>
<input type="email" id="email" name="email" required>
</div>
<div>
<label for="telephone">Téléphone :</label>
<input type="tel" id="telephone" name="telephone">
</div>
<div>
<label for="sujet">Sujet :</label>
<select id="sujet" name="sujet" required>
<option value="">-- Choisissez un service --</option>
<option value="creation">Création de sites web</option>
<option value="refonte">Refonte de sites existants</option>
<option value="seo">Stratégie SEO</option>
<option value="maintenance">Maintenance &amp; hébergement</option>
</select>
</div>
<div>
<label for="message">Message :</label>
<textarea id="message" name="message" rows="5" required></textarea>
</div>
<button type="submit">Envoyer</button>
</form>
</section>
</main>
